<div id="game-container">
    <canvas id="unity-canvas" style="width:100%; height:100%;"></canvas>
</div>
    <!-- Pantalla de victoria -->
    <div id="pantalla-victoria" style="
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        color: white;
        font-family: Arial, sans-serif;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    ">
        <h1 style="font-size: 3rem;">🏆 ¡Ganaste!</h1>
        <p style="font-size: 1.2rem;">Completaste el juego</p>
        <button onclick="location.href='home.html'" style="
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            background: #f5a623;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        ">Volver al inicio</button>
    </div>

    <script>

    const params = new URLSearchParams(window.location.search);
    window.gameUsername = params.get("id") || "Default";

    var buildUrl = "game/Build";
    var loaderUrl = buildUrl + "/game.loader.js";
    var config = {
        dataUrl: buildUrl + "/game.data",
        frameworkUrl: buildUrl + "/game.framework.js",
        codeUrl: buildUrl + "/game.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "game",
        productVersion: "0.1",
    };

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(document.querySelector("#unity-canvas"), config);
    };
    document.body.appendChild(script);

    function GetUsernameFromPage() {
        return window.gameUsername;
    }

    function juegoTerminado() {
        document.getElementById("pantalla-victoria").style.display = "flex";
    }
</script>
